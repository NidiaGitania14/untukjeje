<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Jeje - UTBK 2026</title>
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #faf3f5; }
        .animate-spin-slow { animation: spin 10s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        /* Custom scrollbar for mobile */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Inline SVGs for Lucide-like Icons
        const Icons = {
            Heart: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>,
            Target: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
            Music: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>,
            Zap: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m13 2-9 11h9l-1 9 9-11h-9l1-9z"/></svg>,
            Beaker: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        };

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [showBoost, setShowBoost] = useState(false);
            const [boostMessage, setBoostMessage] = useState('');
            const [selectedCampus, setSelectedCampus] = useState(null);
            
            // Custom States
            const [targetScore, setTargetScore] = useState(750);
            const [isEditingScore, setIsEditingScore] = useState(false);
            const [utbkDate, setUtbkDate] = useState('2026-05-15');
            const [daysLeft, setDaysLeft] = useState(0);

            // Goals & Routine
            const [goals, setGoals] = useState([
                { id: 1, text: 'Latihan Stoikiometri (20 Soal)', completed: false },
                { id: 2, text: 'Review Turunan & Integral', completed: true },
            ]);
            const [newGoal, setNewGoal] = useState('');

            const [routines, setRoutines] = useState([
                { id: 1, day: 'Senin - Rabu', activity: 'MTK (Kalkulus)', color: 'border-blue-400 bg-blue-50/50' },
                { id: 2, day: 'Kamis - Sabtu', activity: 'Kimia (Struktur Atom)', color: 'border-pink-400 bg-pink-50/50' },
            ]);
            const [newDay, setNewDay] = useState('');
            const [newAct, setNewAct] = useState('');
            const [showAddRoutine, setShowAddRoutine] = useState(false);

            useEffect(() => {
                const diff = new Date(utbkDate) - new Date();
                setDaysLeft(Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24))));
            }, [utbkDate]);

            const triggerBoost = () => {
                const quotes = [
                    "Jeje, 'You are the sun, you are the light'. Fokus UTBK 2026 ya!",
                    "Teknik Kimia menantimu. 'Malibu Nights' akan lebih indah pas kamu udah keterima!",
                    "Matematika itu pasti, sesulit apapun ada solusinya. Kamu pasti bisa, Je!",
                    "Don't give up. Pemandangan dari kampus impianmu worth the struggle!",
                    "Jeje, bayangin pake jas lab di UGM/UNPAD sambil dengerin LANY. Manifest it!",
                    "Chemistry is in your blood, Jeje. Taklukkan soal UTBK-nya!",
                    "Anything 4 U, Jeje. Lakuin yang terbaik buat masa depan kamu!",
                    "Hapus air matanya, ganti sama semangat ngerjain soal Kimia. You got this!"
                ];
                setBoostMessage(quotes[Math.floor(Math.random() * quotes.length)]);
                setShowBoost(true);
            };

            const campuses = [
                { name: 'UGM', city: 'Yogya', color: 'bg-blue-900', joke: "Belajar Kimia yang bener ya! Biar nanti di Bulaksumur nggak cuma jago nyampur zat, tapi jago nyampur sama kearifan lokal Jogja!" },
                { name: 'UPNVYK', city: 'Yogya', color: 'bg-green-700', joke: "Teknik Kimia UPN nungguin! Siap-siap 'Bela Negara'. Kimia keras, tapi nggak sekeras matahari Jogja pas upacara!" },
                { name: 'POLBAN', city: 'Bandung', color: 'bg-yellow-600', joke: "Ciwaruga dingin, Jeje! Belajar Termodinamika biar tau cara angetin hati pas praktikum di lab!" },
                { name: 'UNPAD', city: 'Sumedang', color: 'bg-red-800', joke: "Main ke Jatinangor jangan lupa jaket! Jangan sampe skor Kimia kamu kalah sama jauhnya jalan kaki ke gedung lab!" }
            ];

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24 relative overflow-x-hidden">
                    {/* Header */}
                    <header className="bg-white/90 backdrop-blur-md border-b border-pink-100 p-6 sticky top-0 z-30 flex justify-between items-center shadow-sm">
                        <div>
                            <h1 className="text-2xl font-black text-pink-500 tracking-tight italic">FOR JEJE.</h1>
                            <p className="text-[10px] text-gray-400 font-bold tracking-widest uppercase">LANY STYLE • UTBK 2026</p>
                        </div>
                        <div className="flex space-x-3 text-pink-400">
                            <Icons.Beaker />
                        </div>
                    </header>

                    <main className="p-4">
                        {/* Tabs Nav */}
                        <div className="flex space-x-1 mb-6 bg-pink-100/30 p-1.5 rounded-2xl">
                            {['home', 'targets', 'goals'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === t ? 'bg-white text-pink-500 shadow-md scale-[1.02]' : 'text-pink-300 opacity-60'}`}>{t}</button>
                            ))}
                        </div>

                        {/* HOME CONTENT */}
                        {activeTab === 'home' && (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4 duration-500">
                                <div className="bg-gradient-to-br from-rose-400 to-pink-400 rounded-[2.5rem] p-8 text-white shadow-xl relative overflow-hidden">
                                    <Icons.Music />
                                    <h2 className="text-4xl font-black mb-3 italic tracking-tighter mt-4 uppercase">I L Y S B.</h2>
                                    <p className="text-sm font-medium leading-relaxed opacity-90 mb-8">"Anything 4 U", Jeje. Belajar Kimia & MTK dulu yuk!</p>
                                    <div className="bg-white/20 backdrop-blur-md rounded-2xl p-5 inline-block border border-white/10">
                                        <p className="text-[10px] uppercase font-bold tracking-[0.2em] mb-1 opacity-80">Countdown</p>
                                        <p className="text-3xl font-black">{daysLeft} HARI LAGI</p>
                                    </div>
                                </div>

                                <section className="bg-white rounded-[2rem] p-7 shadow-sm border border-pink-50 grid grid-cols-2 gap-4">
                                    <div className="bg-blue-50/50 rounded-2xl p-5 border border-blue-100">
                                        <p className="text-[10px] font-black text-blue-400 uppercase mb-2">Target Skor</p>
                                        <div onClick={() => setIsEditingScore(true)} className="cursor-pointer">
                                            {isEditingScore ? (
                                                <input type="number" value={targetScore} onChange={e => setTargetScore(e.target.value)} onBlur={() => setIsEditingScore(false)} autoFocus className="text-3xl font-black text-blue-600 bg-transparent w-full outline-none" />
                                            ) : (
                                                <p className="text-3xl font-black text-blue-600">{targetScore}</p>
                                            )}
                                        </div>
                                    </div>
                                    <div className="bg-pink-50/50 rounded-2xl p-5 border border-pink-100">
                                        <p className="text-[10px] font-black text-pink-400 uppercase mb-2">UTBK Date</p>
                                        <input type="date" value={utbkDate} onChange={e => setUtbkDate(e.target.value)} className="text-xs font-black text-pink-600 bg-transparent outline-none w-full" />
                                    </div>
                                </section>

                                <button onClick={triggerBoost} className="w-full bg-white hover:bg-pink-50 text-pink-500 font-black py-6 rounded-[2rem] shadow-sm border-2 border-pink-100 flex items-center justify-center space-x-3 tracking-[0.2em] text-xs">
                                    <Icons.Heart />
                                    <span>BOOST MOTIVATION</span>
                                </button>
                            </div>
                        )}

                        {/* TARGETS CONTENT */}
                        {activeTab === 'targets' && (
                            <div className="space-y-4 animate-in fade-in duration-500">
                                <h2 className="text-3xl font-black text-gray-800 italic uppercase mb-6 px-4">The Dream.</h2>
                                {campuses.map(c => (
                                    <div key={c.name} onClick={() => setSelectedCampus(c)} className="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 flex items-center justify-between group hover:border-pink-300 hover:shadow-xl transition-all cursor-pointer relative mx-2">
                                        <div className="flex items-center space-x-5">
                                            <div className={`w-14 h-14 rounded-2xl ${c.color} flex items-center justify-center text-white font-black text-xl shadow-lg`}>{c.name[0]}</div>
                                            <div>
                                                <h4 className="font-black text-gray-800 text-lg tracking-tight">{c.name}</h4>
                                                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">{c.city} • TEKNIK KIMIA</p>
                                            </div>
                                        </div>
                                        <div className="text-pink-100 group-hover:text-pink-400 transition-colors"><Icons.Zap /></div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* GOALS CONTENT */}
                        {activeTab === 'goals' && (
                            <div className="space-y-8 animate-in slide-in-from-bottom-6 duration-500">
                                <section className="bg-white rounded-[2.5rem] p-7 shadow-sm border border-gray-100">
                                    <h3 className="font-black text-gray-700 uppercase mb-6 flex items-center text-lg tracking-tighter"><Icons.Target /> <span className="ml-2">TO DO LIST</span></h3>
                                    <div className="flex gap-2 mb-4">
                                        <input type="text" value={newGoal} onChange={e => setNewGoal(e.target.value)} placeholder="Tambah target..." className="flex-1 bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm font-bold outline-none" />
                                        <button onClick={() => { if(newGoal) setGoals([...goals, {id:Date.now(), text:newGoal, completed:false}]); setNewGoal('') }} className="bg-pink-500 text-white p-3 rounded-xl"><Icons.Plus /></button>
                                    </div>
                                    <div className="space-y-3">
                                        {goals.map(g => (
                                            <div key={g.id} className={`flex items-center p-4 rounded-2xl transition-all ${g.completed ? 'bg-gray-50 opacity-60' : 'bg-white border border-pink-50'}`}>
                                                <div onClick={() => setGoals(goals.map(item => item.id === g.id ? {...item, completed:!item.completed} : item))} className={`w-6 h-6 rounded-lg border-2 mr-4 cursor-pointer flex items-center justify-center ${g.completed ? 'bg-pink-500 border-pink-500' : 'border-pink-200 bg-white'}`}>
                                                    {g.completed && <Icons.X />}
                                                </div>
                                                <span className={`flex-1 text-sm font-bold tracking-tight ${g.completed ? 'text-gray-300 line-through' : 'text-gray-700'}`}>{g.text}</span>
                                                <button onClick={() => setGoals(goals.filter(item => item.id !== g.id))} className="text-gray-300 hover:text-red-400 ml-2"><Icons.Trash /></button>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section className="bg-white rounded-[2.5rem] p-7 shadow-sm border border-gray-100">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-black text-gray-700 uppercase flex items-center text-lg tracking-tighter"><Icons.Calendar /> <span className="ml-2">STUDY ROUTINE</span></h3>
                                        <button onClick={() => setShowAddRoutine(!showAddRoutine)} className="text-[10px] font-black text-pink-400 bg-pink-50 px-3 py-1.5 rounded-full">{showAddRoutine ? 'Batal' : '+ Tambah'}</button>
                                    </div>
                                    {showAddRoutine && (
                                        <div className="mb-6 p-4 bg-gray-50 rounded-2xl space-y-3">
                                            <input type="text" placeholder="Hari/Waktu" value={newDay} onChange={e => setNewDay(e.target.value)} className="w-full bg-white border border-gray-200 rounded-xl px-4 py-2 text-xs font-bold outline-none" />
                                            <input type="text" placeholder="Mata Pelajaran" value={newAct} onChange={e => setNewAct(e.target.value)} className="w-full bg-white border border-gray-200 rounded-xl px-4 py-2 text-xs font-bold outline-none" />
                                            <button onClick={() => { if(newDay && newAct) setRoutines([...routines, {id:Date.now(), day:newDay, activity:newAct, color:'border-purple-400 bg-purple-50/50'}]); setNewDay(''); setNewAct(''); setShowAddRoutine(false) }} className="w-full bg-pink-500 text-white font-black py-2 rounded-xl text-xs uppercase tracking-widest">Simpan</button>
                                        </div>
                                    )}
                                    <div className="space-y-4">
                                        {routines.map(r => (
                                            <div key={r.id} className={`p-5 rounded-[1.5rem] border-l-4 shadow-sm relative group ${r.color}`}>
                                                <p className="text-[10px] font-black uppercase mb-1 opacity-70">{r.day}</p>
                                                <p className="text-sm font-black text-gray-800">{r.activity}</p>
                                                <button onClick={() => setRoutines(routines.filter(item => item.id !== r.id))} className="absolute right-4 top-4 opacity-0 group-hover:opacity-100 transition-opacity text-gray-400"><Icons.Trash /></button>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-8 p-5 bg-black rounded-[1.5rem] text-white flex items-center space-x-4">
                                        <div className="text-pink-400 animate-spin-slow"><Icons.Music /></div>
                                        <div>
                                            <p className="text-[10px] font-black uppercase tracking-widest text-pink-300">Playlist Belajar</p>
                                            <p className="text-xs font-bold italic">LANY - Everything Everywhere</p>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    {/* MODALS */}
                    {selectedCampus && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-md z-50 flex items-center justify-center p-6" onClick={() => setSelectedCampus(null)}>
                            <div className="bg-white w-full max-w-xs rounded-[3rem] p-9 relative shadow-2xl animate-in zoom-in" onClick={e => e.stopPropagation()}>
                                <div className={`w-20 h-20 rounded-3xl ${selectedCampus.color} mx-auto mb-8 flex items-center justify-center text-white font-black text-3xl shadow-xl`}>{selectedCampus.name[0]}</div>
                                <h3 className="text-center text-2xl font-black text-gray-800 mb-2 italic tracking-tighter">{selectedCampus.name}</h3>
                                <p className="text-center text-[10px] text-pink-400 font-black uppercase tracking-[0.3em] mb-8">Chemistry Target</p>
                                <div className="bg-pink-50 rounded-2xl p-6 border-2 border-pink-100 italic text-gray-700 text-sm leading-relaxed text-center font-medium font-serif">"{selectedCampus.joke}"</div>
                                <button onClick={() => setSelectedCampus(null)} className="w-full mt-10 bg-gray-900 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs shadow-lg active:scale-95 transition-all">OKAY, BOSS! 🧪</button>
                            </div>
                        </div>
                    )}

                    {showBoost && (
                        <div className="fixed inset-0 bg-pink-500/95 backdrop-blur-xl z-50 flex items-center justify-center p-8 text-center" onClick={() => setShowBoost(false)}>
                            <div className="max-w-xs animate-in zoom-in duration-300">
                                <div className="text-white opacity-50 mb-8 flex justify-center"><Icons.Music /></div>
                                <h2 className="text-4xl font-black text-white mb-6 italic uppercase tracking-tighter">A MESSAGE 4 U.</h2>
                                <p className="text-2xl text-white font-black leading-tight mb-12 italic tracking-tight">"{boostMessage}"</p>
                                <button className="px-12 py-5 bg-white text-pink-500 font-black rounded-full uppercase tracking-[0.2em] text-[10px] shadow-2xl active:scale-95 transition-all">CLOSE & STUDY</button>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-pink-50 py-4 text-center z-10">
                        <div className="flex items-center justify-center space-x-2 text-[9px] text-pink-300 font-black uppercase tracking-[0.3em]">
                            <span>JEJE</span>
                            <div className="w-2.5 h-2.5 fill-pink-300 flex items-center"><Icons.Heart /></div>
                            <span>UTBK 2026</span>
                            <div className="w-2.5 h-2.5 fill-pink-300 flex items-center"><Icons.Heart /></div>
                            <span>TEKNIK KIMIA</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
